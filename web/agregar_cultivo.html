<form action="guardar_cultivo.php" method="POST">
	<label>Nombre del cultivo</label>
	<input type="text" name="nombre_cultivo" required />

	<label>Tipo de cultivo</label>
	<input type="text" name="tipo_cultivo" />

	<label>Ubicación</label>
	<input type="text" name="ubicacion" />

	<label>Área (m²)</label>
	<input type="number" step="0.01" name="area_m2" />

	<label>Fecha de siembra</label>
	<input type="date" name="fecha_siembra" />

	<button type="submit">Guardar cultivo</button>
</form>
